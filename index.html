<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長者健康運動網</title>
    <style>
        /* ==========================================================================
           設計與顏色風格 (Design & Style)
           主題：溫和的淺綠色和大地色、大自然、平靜、清晰、無多餘裝飾
           字體：特大字體、高對比度，方便長者閱讀
           ========================================================================== */
        :root {
            /* 溫和的綠色系 */
            --primary-green: #2E7D32; /* 深綠色，用於標題和重要按鈕 */
            --light-green: #E8F5E9;   /* 淺綠色，用於背景 */
            /* 大地色系 */
            --earth-brown: #4E342E;   /* 深褐色，用於次要文字 */
            --earth-light: #F5F5DC;   /* 米黃色大地背景 */
            
            --text-main: #1A1A1A;     /* 高對比黑色，用於主要閱讀文字 */
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
            background-color: var(--earth-light);
            color: var(--text-main);
            /* 長者友善：基礎字體設定為較大尺寸 (約 22px) */
            font-size: 1.375rem; 
            line-height: 1.6;
        }

        /* --- 頂部 (Header/Hero) --- */
        .hero-section {
            position: relative;
            height: 70vh; /* 佔螢幕高度 70% */
            min-height: 400px;
            /* 大風景相片 */
            background-image: linear-gradient(rgba(0, 50, 0, 0.5), rgba(0, 50, 0, 0.6)), url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
        }

        .hero-title {
            font-size: 3.5rem; /* 特大標題 */
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            margin: 0 20px;
            letter-spacing: 2px;
        }

        /* 向下的箭咀 */
        .scroll-down-arrow {
            position: absolute;
            bottom: 40px;
            font-size: 4rem;
            color: var(--white);
            text-decoration: none;
            animation: bounce 2s infinite;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        /* --- 中部 (Main Content) --- */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* 4個分類按鈕 */
        .filter-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
        }

        .filter-btn {
            background-color: var(--white);
            color: var(--primary-green);
            border: 3px solid var(--primary-green);
            padding: 15px 40px;
            font-size: 1.8rem; /* 特大按鈕文字 */
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--primary-green);
            color: var(--white);
        }

        /* 卡片展示區 (Grid Layout) */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        /* 卡片樣式 */
        .card {
            background-color: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            border: 2px solid var(--primary-green);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .card-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-bottom: 4px solid var(--primary-green);
        }

        .card-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1.8rem;
            color: var(--primary-green);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .card-desc {
            font-size: 1.4rem;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        /* 互動按鈕標籤樣式 */
        .action-badge {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        .badge-video {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #c62828;
        }

        .badge-image {
            background-color: #e3f2fd;
            color: #1565c0;
            border: 2px solid #1565c0;
        }

        /* PDF 專屬下載按鈕 */
        .badge-pdf {
            background-color: var(--primary-green);
            color: var(--white);
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-decoration: none;
        }
        .badge-pdf:hover {
            background-color: #1b5e20;
        }

        /* --- 底部 (Footer) --- */
        footer {
            background-color: var(--earth-brown);
            color: var(--white);
            text-align: center;
            padding: 30px 20px;
            font-size: 1.5rem;
            margin-top: 60px;
        }

        /* --- 彈出視窗 (Modal / Lightbox) --- */
        .modal-overlay {
            display: none; /* 預設隱藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: var(--white);
            border-radius: 12px;
            padding: 10px;
        }

        .modal-content.image-mode {
            background: transparent;
            padding: 0;
        }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0px;
            font-size: 3rem;
            color: var(--white);
            cursor: pointer;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* YouTube 16:9 容器 */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        /* 放大圖片 */
        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            border: 4px solid var(--white);
        }

        /* 響應式微調 */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .filter-btn { padding: 10px 25px; font-size: 1.4rem; }
            .close-btn { top: -60px; right: 10px; }
        }
    </style>
</head>
<body>

    <!-- 頂部 (Header/Hero) -->
    <header class="hero-section" id="top">
        <h1 class="hero-title">天天做運動，健康伴你行</h1>
        <a href="#content-area" class="scroll-down-arrow">⬇</a>
    </header>

    <!-- 中部 (Main Content) -->
    <main class="main-container" id="content-area">
        
        <!-- 分類按鈕 (4個分類) -->
        <nav class="filter-nav">
            <button class="filter-btn active" onclick="renderCards('all')">全部</button>
            <button class="filter-btn" onclick="renderCards('taichi')">太極</button>
            <button class="filter-btn" onclick="renderCards('stretch')">拉筋</button>
            <button class="filter-btn" onclick="renderCards('dance')">跳舞</button>
        </nav>

        <!-- 卡片展示區 -->
        <div class="card-grid" id="cardGrid">
            <!-- 這裡的內容會由下方的 JavaScript 根據 siteData 自動生成 -->
        </div>

    </main>

    <!-- 底部 (Footer) -->
    <footer>
        <p>2026 社區中心版權所有</p>
    </footer>

    <!-- 互動彈出視窗 (用於播放影片或顯示大圖) -->
    <div class="modal-overlay" id="myModal" onclick="closeModal(event)">
        <div class="modal-content" id="modalContent">
            <span class="close-btn" onclick="closeModal(event, true)">&times;</span>
            <!-- 影片或圖片將被注入到這裡 -->
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- JavaScript 邏輯與資料 -->
    <script>
        /* ==========================================================================
           👇👇👇 【我可以修改資料的地方】 👇👇👇 
           數據與內容管理 (Data Management)
           說明：所有網站卡片資料都在這裡。您可以自由增加、刪除或修改以下內容。
           
           欄位說明：
           - category: 必須填寫 'taichi' (太極), 'stretch' (拉筋), 或 'dance' (跳舞)。
           - type: 必須填寫 'video' (影片), 'image' (相片), 或 'pdf' (檔案)。
           - title: 卡片的大標題。
           - desc: 卡片的簡介文字。
           - thumbnail: 卡片上顯示的預覽圖網址。
           - contentUrl: 
               - 如果是 video: 請放入 YouTube 的「嵌入網址」(Embed URL)，例如 https://www.youtube.com/embed/...
               - 如果是 image: 請放入高清大圖的網址。
               - 如果是 pdf: 請放入 PDF 檔案的下載網址。
           ========================================================================== */
        const siteData = [
            {
                category: 'taichi',
                type: 'video',
                title: '八式太極拳 (入門)',
                desc: '適合初學者的簡單太極動作，每日早晨必做，強身健體。',
                thumbnail: 'https://images.unsplash.com/photo-1599901860904-17e0862788f2?q=80&w=800&auto=format&fit=crop',
                contentUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ' // 示範影片連結
            },
            {
                category: 'stretch',
                type: 'image',
                title: '長者椅子拉筋示範',
                desc: '坐在椅子上也能輕鬆舒展筋骨，點擊相片可以放大檢視每個動作細節。',
                thumbnail: 'https://images.unsplash.com/photo-1552825906-9e508f5d0b42?q=80&w=800&auto=format&fit=crop',
                contentUrl: 'https://images.unsplash.com/photo-1552825906-9e508f5d0b42?q=80&w=1600&auto=format&fit=crop' // 大圖連結
            },
            {
                category: 'stretch',
                type: 'pdf',
                title: '每日拉筋圖解指南 (下載版)',
                desc: '附有詳細大字版圖文教學的電子書，可下載列印慢慢看。',
                thumbnail: 'https://images.unsplash.com/photo-1544367567-0f2fcb046ebf?q=80&w=800&auto=format&fit=crop',
                contentUrl: '#dummy_pdf_link' // 替換為真實的 PDF 連結
            },
            {
                category: 'dance',
                type: 'video',
                title: '活力社區廣場舞',
                desc: '跟隨音樂節奏一起活動身體，保持心情開朗，關節靈活。',
                thumbnail: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?q=80&w=800&auto=format&fit=crop',
                contentUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ'
            },
            {
                category: 'taichi',
                type: 'image',
                title: '太極班大合照',
                desc: '上個月社區中心太極班結業的大合照，看看有沒有熟悉的朋友！',
                thumbnail: 'https://images.unsplash.com/photo-1528629297340-d1d466945dc5?q=80&w=800&auto=format&fit=crop',
                contentUrl: 'https://images.unsplash.com/photo-1528629297340-d1d466945dc5?q=80&w=1600&auto=format&fit=crop'
            }
        ];
        /* 👆👆👆 【修改資料結束】 👆👆👆 */
        /* ========================================================================== */

        const cardGrid = document.getElementById('cardGrid');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // 頁面載入時預設顯示全部
        window.onload = () => {
            renderCards('all');
        };

        // 根據分類渲染卡片
        function renderCards(filterCategory) {
            // 1. 更新按鈕的活躍狀態 (顏色變化)
            filterBtns.forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('onclick').includes(filterCategory)) {
                    btn.classList.add('active');
                }
            });

            // 2. 清空現有卡片
            cardGrid.innerHTML = '';

            // 3. 過濾並生成新卡片
            const filteredData = filterCategory === 'all' 
                ? siteData 
                : siteData.filter(item => item.category === filterCategory);

            filteredData.forEach(item => {
                // 根據類型產生不同的按鈕文字與點擊事件
                let actionHtml = '';
                let onClickEvent = '';

                // 功能 1 & 2 & 3: 根據資料自動判斷互動方式
                if (item.type === 'video') {
                    actionHtml = `<span class="action-badge badge-video">▶ 點擊播放影片</span>`;
                    onClickEvent = `onclick="openModal('video', '${item.contentUrl}')"`;
                } else if (item.type === 'image') {
                    actionHtml = `<span class="action-badge badge-image">🔍 點擊放大相片</span>`;
                    onClickEvent = `onclick="openModal('image', '${item.contentUrl}')"`;
                } else if (item.type === 'pdf') {
                    // 如果是 PDF，直接顯示下載按鈕，不需要 onClick 打開視窗
                    actionHtml = `<a href="${item.contentUrl}" target="_blank" class="action-badge badge-pdf" onclick="event.stopPropagation();">📥 下載 PDF 檔案</a>`;
                }

                // 組合卡片 HTML
                const cardHTML = `
                    <div class="card" ${onClickEvent}>
                        <img src="${item.thumbnail}" alt="${item.title}" class="card-image" loading="lazy">
                        <div class="card-content">
                            <div>
                                <h3 class="card-title">${item.title}</h3>
                                <p class="card-desc">${item.desc}</p>
                            </div>
                            <div style="margin-top: 15px;">
                                ${actionHtml}
                            </div>
                        </div>
                    </div>
                `;
                cardGrid.innerHTML += cardHTML;
            });
        }

        // --- 彈出視窗 (Modal) 邏輯 ---
        const modalOverlay = document.getElementById('myModal');
        const modalContent = document.getElementById('modalContent');
        const modalBody = document.getElementById('modalBody');

        // 開啟視窗
        function openModal(type, url) {
            modalBody.innerHTML = ''; // 清空內容
            
            if (type === 'video') {
                // 功能 1: 網頁內播放 YouTube
                modalContent.classList.remove('image-mode');
                modalBody.innerHTML = `
                    <div class="video-container">
                        <iframe src="${url}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
                    </div>
                `;
            } else if (type === 'image') {
                // 功能 3: 放大圖片 (Lightbox)
                modalContent.classList.add('image-mode');
                modalBody.innerHTML = `<img src="${url}" class="lightbox-img" alt="放大圖片">`;
            }
            
            modalOverlay.style.display = 'flex';
        }

        // 關閉視窗 (點擊 X 按鈕 或 點擊背景)
        function closeModal(event, forceClose = false) {
            // 如果點擊的是背景本身(不是內容)，或是強制點擊了 X 按鈕
            if (event.target === modalOverlay || forceClose) {
                modalOverlay.style.display = 'none';
                modalBody.innerHTML = ''; // 清空內容即可停止 YouTube 播放
            }
        }
    </script>
</body>
</html>

```
